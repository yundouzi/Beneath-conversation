    item.append(swatch, document.createTextNode(`${def.label} ${def.name}`));
    row1.appendChild(item);
  });
  const row2 = el("div", "legend-row");
  const s1 = el("span", "speaker-dot");
  s1.style.background = COLORS.taupe;
  const s2 = el("span", "speaker-dot");
  s2.style.background = COLORS.purple;
  const evIcon = el("span", "event-icon");
  evIcon.append(el("i"), el("i"), el("i"));
  const i1 = el("div", "legend-item"); i1.append(s1, document.createTextNode(data.episode.host || "Lu Yu"));
  const i2 = el("div", "legend-item"); i2.append(s2, document.createTextNode(data.episode.guest || "Jiang Shengnan"));
  const i3 = el("div", "legend-item"); i3.append(evIcon, document.createTextNode("Events"));
  row2.append(i1, i2, i3);
  const zoom = el("div", "zoom-readout", "30%");
  zoom.id = "zoom-readout";
  wrap.append(row1, row2, zoom);
  return wrap;
}

function renderAudioControls(data) {
  const wrap = el("div", "audio-controls");
  const audio = document.createElement("audio");
  audio.src = data.episode.audioSrc;
  audio.className = "native-audio";
  state.audio = audio;
  const play = el("button", "audio-play", "▶");
  play.type = "button";
  play.addEventListener("click", () => {
    if (audio.paused) audio.play();
    else audio.pause();
  });
  const time = el("span", "audio-time", `0:00 / ${formatTime(data.episode.duration || 0)}`);
  const seek = el("input", "audio-seek");
  seek.type = "range";
  seek.min = "0";
  seek.max = String(data.episode.duration || 0);
  seek.step = "0.1";
  seek.value = "0";
  seek.addEventListener("input", () => {
    audio.currentTime = Number(seek.value);
    updatePlayhead();
  });
  const volume = el("span", "audio-volume", "●");
  const more = el("span", "audio-more", "⋮");
  audio.addEventListener("play", () => { play.textContent = "Ⅱ"; });
  audio.addEventListener("pause", () => { play.textContent = "▶"; });
  wrap.append(audio, play, time, seek, volume, more);
  return wrap;
}

function renderVariableControl() {
  const wrap = el("label", "variable-control");
  const shell = el("span", "filter-shell");
  const select = el("select", "audio-variable-select");
  select.append(new Option("loudness", "loudness"), new Option("pitch", "pitch"));
  select.value = state.variable;
  select.addEventListener("change", () => {
    state.variable = select.value;
    redrawChart();
  });
  shell.appendChild(select);
  shell.appendChild(el("span", "filter-caret", "▼"));
  wrap.appendChild(shell);
  return wrap;
}

function renderChart(data) {
  const scroller = el("div", "chart-viewport");
  state.scroller = scroller;
  const width = Math.ceil(data.episode.displayDuration * pxPerSec()) + LAYOUT.chartLeft + 80;
  const svg = svgEl("svg", { class: "chart-svg", width, height: LAYOUT.plotHeight, viewBox: `0 0 ${width} ${LAYOUT.plotHeight}` });
  state.svg = svg;
  scroller.appendChild(svg);
  drawChart(svg, data, width);
  return scroller;
}

function clearSvg(svg) {
  while (svg.firstChild) svg.removeChild(svg.firstChild);
}

function redrawChart() {
  const width = Math.ceil(state.data.episode.displayDuration * pxPerSec()) + LAYOUT.chartLeft + 80;
  state.svg.setAttribute("width", width);
  state.svg.setAttribute("viewBox", `0 0 ${width} ${LAYOUT.plotHeight}`);
  clearSvg(state.svg);
  drawChart(state.svg, state.data, width);
  updatePlayhead();
}

function xOf(t) {
  return LAYOUT.chartLeft + displayTimeForAudioTime(t) * pxPerSec();
}

function drawChart(svg, data, width) {
  drawTopicBackground(svg, data);
  drawGrid(svg, width);
  drawZeroLine(svg, width);
  drawSentimentBars(svg, data);
  drawAudioLine(svg, data);
  drawEvents(svg, data);
  state.playhead = svgEl("line", { x1: 0, x2: 0, y1: 0, y2: LAYOUT.plotHeight, stroke: COLORS.black, "stroke-width": 2 });
  svg.appendChild(state.playhead);
}

function drawGrid(svg, width) {
  const g = svgEl("g");
  const horizontalGuides = [
    { y: sentimentY(0.8), label: "0.8 Strongly Positive", area: "sentiment", solid: false },
    { y: sentimentY(0.2), label: "0.2 Positive", area: "sentiment", solid: false },
    { y: sentimentY(0), label: "0 Neutral", area: "sentiment", solid: true },
    { y: sentimentY(-0.2), label: "-0.2 Negative", area: "sentiment", solid: false },
    { y: sentimentY(-0.8), label: "-0.8 Strongly Negative", area: "sentiment", solid: false },
    ...audioGuides()
  ];
  horizontalGuides.forEach(({ y, label, area, solid }) => {
    g.appendChild(svgEl("line", {
      x1: LAYOUT.chartLeft,
      x2: width,
      y1: y,
      y2: y,
      stroke: solid ? COLORS.line : COLORS.lineSoft,
      "stroke-dasharray": solid ? "" : "4 8",
      "stroke-width": solid ? 1.2 : 1
    }));
    const text = svgEl("text", { x: LAYOUT.chartLeft + 7, y: y - 4, class: `axis-label axis-label-${area}`, "text-anchor": "start" });
    text.textContent = label;
    g.appendChild(text);
  });
  g.appendChild(svgEl("line", { x1: LAYOUT.chartLeft, x2: width, y1: LAYOUT.plotHeight - 22, y2: LAYOUT.plotHeight - 22, stroke: COLORS.line, "stroke-width": 1 }));
  svg.appendChild(g);
}

function drawTopicBackground(svg, data) {
  const g = svgEl("g", { opacity: 1 });
  data.sentences.forEach((s) => {
    const def = data.topicDefinitions[s.cluster] || data.topicDefinitions[6];
    const x = xOf(s.displayStart);
    const w = Math.max(1, (s.displayEnd - s.displayStart) * pxPerSec());
    g.appendChild(svgEl("rect", { x, y: 0, width: w, height: LAYOUT.plotHeight, fill: def.color, opacity: def.opacity }));
  });
  svg.appendChild(g);
}

function drawZeroLine(svg, width) {
  svg.appendChild(svgEl("line", { x1: LAYOUT.chartLeft, x2: width, y1: LAYOUT.audioTop, y2: LAYOUT.audioTop, stroke: COLORS.lineSoft, "stroke-width": 1 }));
  drawTimeAxis(svg);
}

function drawTimeAxis(svg) {
  const g = svgEl("g");
  const duration = state.data.episode.displayDuration;
  const step = 60;
  for (let t = 0; t <= duration; t += step) {
    const x = xOf(t);
    g.appendChild(svgEl("line", { x1: x, x2: x, y1: 0, y2: LAYOUT.plotHeight - 22, stroke: COLORS.lineSoft, "stroke-width": 1 }));
    g.appendChild(svgEl("line", { x1: x, x2: x, y1: LAYOUT.plotHeight - 22, y2: LAYOUT.plotHeight - 16, stroke: COLORS.line, "stroke-width": 1 }));
    const text = svgEl("text", { x, y: LAYOUT.plotHeight - 4, "text-anchor": "middle", class: "axis-label" });
    text.textContent = formatTime(t);
    g.appendChild(text);
  }
  svg.appendChild(g);
}

function sentimentY(score) {
  const top = LAYOUT.sentimentTop + 28;
  const bottom = LAYOUT.sentimentBottom - 20;
  const mid = (top + bottom) / 2;
  const half = (bottom - top) / 2;
  return mid - Math.max(-1, Math.min(1, score)) * half;
}

function audioValues(data = state.data) {
  return (data?.sentences || []).map((s) => Number(s[state.variable])).filter(Number.isFinite);
}

function audioStats(data = state.data) {
  const values = audioValues(data);
  const max = Math.max(...values, 1);
  const avg = values.length ? values.reduce((sum, v) => sum + v, 0) / values.length : 0;
  return { values, max, avg };
}

function audioY(value, stats = audioStats()) {
  const top = LAYOUT.audioTop + 35;
  const bottom = LAYOUT.audioBottom - 35;
  const max = Math.max(stats.max, 1e-6);
  const ratio = Math.max(0, Math.min(1, value / max));
  return bottom - ratio * (bottom - top);
}

function formatAxisNumber(value) {
  if (!Number.isFinite(value)) return "0";
  if (Math.abs(value) >= 10) return value.toFixed(1);
  return value.toFixed(2).replace(/0+$/, "").replace(/\.$/, "");
}

function audioGuides() {
  const stats = audioStats();
  return [
    { y: audioY(stats.max, stats), label: `Max=${formatAxisNumber(stats.max)}`, area: "audio", solid: false },
    { y: audioY(stats.avg, stats), label: `Average=${formatAxisNumber(stats.avg)}`, area: "audio", solid: false },
    { y: audioY(0, stats), label: "0", area: "audio", solid: true }
  ];
}

function drawSentimentBars(svg, data) {
  const g = svgEl("g");
  const zero = sentimentY(0);
  data.sentences.forEach((s) => {
    const x = xOf(s.displayStart);
    const w = Math.max(1, (s.displayEnd - s.displayStart) * pxPerSec());
    const y = sentimentY(s.score);
    const h = Math.max(1, Math.abs(zero - y));
    g.appendChild(svgEl("rect", {
      x,
      y: Math.min(y, zero),
      width: w,
      height: h,
      fill: s.speakerColor
    }));
  });
  svg.appendChild(g);
}

function normalize(values, value) {
  const valid = values.filter((v) => Number.isFinite(v));
  const min = Math.min(...valid);
  const max = Math.max(...valid);
  if (!Number.isFinite(min) || !Number.isFinite(max) || max === min) return 0.5;
  return (value - min) / (max - min);
}

function drawAudioLine(svg, data) {
  const stats = audioStats(data);
  const g = svgEl("g");
  const points = [];
  data.sentences.forEach((s) => {
    const v = Number(s[state.variable]);
    if (!Number.isFinite(v)) return;
    const y = audioY(v, stats);
    points.push({ x: xOf(s.displayMid), y, color: s.speakerColor || COLORS.taupe });
  });
  for (let i = 1; i < points.length; i += 1) {
    const prev = points[i - 1];
    const next = points[i];
    g.appendChild(svgEl("line", {
      x1: prev.x,
      y1: prev.y,
      x2: next.x,
      y2: next.y,
      stroke: next.color,
      "stroke-width": 4,
      "stroke-linejoin": "round",
      "stroke-linecap": "round"
    }));
  }
  svg.appendChild(g);
}

function drawEvents(svg, data) {
  const g = svgEl("g");
  data.events.forEach((ev) => {
    const x = xOf(ev.displayTime);
    [-3, 0, 3].forEach((dx) => {
      const line = svgEl("line", {
        x1: x + dx,
        x2: x + dx,
        y1: 0,
        y2: LAYOUT.plotHeight,
        stroke: COLORS.purple,
        "stroke-width": 1.8
      });
      g.appendChild(line);
    });
    const hit = svgEl("rect", { x: x - 8, y: 0, width: 16, height: LAYOUT.plotHeight, fill: COLORS.text, opacity: 0 });
    hit.addEventListener("mouseenter", (e) => showTooltip(e, eventTooltip(ev)));
    hit.addEventListener("mousemove", (e) => moveTooltip(e));
    hit.addEventListener("mouseleave", hideTooltip);
    g.appendChild(hit);
  });
  svg.appendChild(g);
}

function eventTooltip(ev) {
  return `<strong>${ev.event_type_en}</strong><br>Time: ${formatTime(ev.start)}–${formatTime(ev.end)}<br>Duration: ${ev.duration.toFixed(2)}s<br>Speaker: ${ev.speaker}<br>Confidence: ${Math.round((ev.confidence || 0) * 100)}%<br>${ev.representative_sentence_en}`;
}

function formatTime(sec) {
  const s = Math.max(0, Math.round(sec));
  return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, "0")}`;
}

function renderTooltip() {
  const t = el("div", "tooltip hidden");
  t.id = "tooltip";
  return t;
}

function showTooltip(event, html) {
  const t = document.getElementById("tooltip");
  t.innerHTML = html;
  t.classList.remove("hidden");
  moveTooltip(event);
}

function moveTooltip(event) {
  const t = document.getElementById("tooltip");
  t.style.left = `${event.clientX + 16}px`;
  t.style.top = `${event.clientY + 16}px`;
}

function hideTooltip() {
  document.getElementById("tooltip")?.classList.add("hidden");
}

function wireInteractions() {
  const scroller = state.scroller;
  scroller.addEventListener("click", (event) => {
    if (state.isDragging) return;
    const rect = scroller.getBoundingClientRect();
    const displayTime = (event.clientX - rect.left + scroller.scrollLeft - LAYOUT.chartLeft) / pxPerSec();
    state.audio.currentTime = audioTimeForDisplayTime(displayTime);
    updatePlayhead();
  });
  scroller.addEventListener("wheel", (event) => {
    if (event.ctrlKey) {
      event.preventDefault();
      const rect = scroller.getBoundingClientRect();
      const anchor = (event.clientX - rect.left + scroller.scrollLeft - LAYOUT.chartLeft) / pxPerSec();
      const old = state.zoom;
      state.zoom = Math.max(LAYOUT.minZoom, Math.min(LAYOUT.maxZoom, state.zoom * (event.deltaY < 0 ? 1.08 : 0.92)));
      const nextScroll = LAYOUT.chartLeft + anchor * pxPerSec() - (event.clientX - rect.left);
      redrawChart();
      scroller.scrollLeft = nextScroll;
      document.getElementById("zoom-readout").textContent = `${Math.round(state.zoom * 100)}%`;
      console.log("Zoom changed:", old, "->", state.zoom);
    } else if (event.shiftKey) {
      event.preventDefault();
      scroller.scrollLeft += event.deltaY;
    }
  }, { passive: false });
  scroller.addEventListener("pointerdown", (event) => {
    state.isDragging = false;
    state.dragStartX = event.clientX;
    state.dragScrollLeft = scroller.scrollLeft;
    scroller.setPointerCapture(event.pointerId);
  });
  scroller.addEventListener("pointermove", (event) => {
    if (!scroller.hasPointerCapture(event.pointerId)) return;
    const dx = event.clientX - state.dragStartX;
    if (Math.abs(dx) > 3) {
      state.isDragging = true;
      scroller.classList.add("dragging");
      scroller.scrollLeft = state.dragScrollLeft - dx;
    }
  });
  scroller.addEventListener("pointerup", (event) => {
    scroller.releasePointerCapture(event.pointerId);
    scroller.classList.remove("dragging");
    setTimeout(() => { state.isDragging = false; }, 0);
  });
  state.audio.addEventListener("timeupdate", updatePlayhead);
  state.audio.addEventListener("seeked", updatePlayhead);
}

function updatePlayhead() {
  if (!state.playhead || !state.audio) return;
  const x = xOf(displayTimeForAudioTime(state.audio.currentTime));
  state.playhead.setAttribute("x1", x);
  state.playhead.setAttribute("x2", x);
  const seek = document.querySelector(".audio-seek");
  const time = document.querySelector(".audio-time");
  if (seek) seek.value = String(state.audio.currentTime || 0);
  if (time) time.textContent = `${formatTime(state.audio.currentTime || 0)} / ${formatTime(state.audio.duration || state.data.episode.duration || 0)}`;
  const left = state.scroller.scrollLeft;
  const right = left + state.scroller.clientWidth;
  if (!state.audio.paused && x > right - 160) state.scroller.scrollLeft = x - state.scroller.clientWidth * 0.45;
}

function renderBottomPanels(data) {
  const wrap = el("section", "bottom-panels");
  const left = el("div", "left-panels");
  left.appendChild(renderPanel("Overview of Sentiment Analysis", renderSentimentTable(data.overview.sentimentRows)));
  left.appendChild(renderPanel("Overview of Acoustic Events", renderEventTable(data.overview.eventRows)));
  wrap.appendChild(left);
  wrap.appendChild(renderPanel("Overview of Topic Clusters", renderClusterTable(data.overview.clusterRows)));
  return wrap;
}

function renderPanel(title, content) {
  const panel = el("div", "panel");
  panel.appendChild(el("h2", "", title));
  const scroll = el("div", "panel-scroll");
  scroll.appendChild(content);
  panel.appendChild(scroll);
  return panel;
}

function makeTable(headers, rows) {
  const table = document.createElement("table");
  const thead = document.createElement("thead");
  const trh = document.createElement("tr");
  headers.forEach((h) => trh.appendChild(el("th", "", h)));
  thead.appendChild(trh);
  const tbody = document.createElement("tbody");
  rows.forEach((cells) => {
    const tr = document.createElement("tr");
    cells.forEach((cell) => {
      const td = document.createElement("td");
      if (cell instanceof Node) td.appendChild(cell);
      else td.textContent = cell;
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  table.append(thead, tbody);
  return table;
}

function renderSentimentTable(rows) {
  return makeTable(["Sentiment", "Distribution", "Representative Sentences"], rows.map((r) => [r.sentiment, r.distribution, r.representative_sentences]));
}

function renderEventTable(rows) {
  const safe = rows.length ? rows : [{ event: "No Event", times: 0, representative_sentences_before_events: "No acoustic event is available for this episode." }];
  return makeTable(["Event", "Times", "Representative Sentences Before Events"], safe.map((r) => [r.event, String(r.times), r.representative_sentences_before_events]));
}

function renderClusterTable(rows) {
  return makeTable(
    ["Cluster", "First Category", "Second Category", "Key Words", "Duration", "Proportion", "Representative Sentences"],
    rows.map((r) => {
      const cell = el("div", "cluster-cell");
      const chip = el("span", "cluster-chip");
      chip.style.background = r.color;
      chip.style.opacity = r.opacity;
      cell.append(chip, document.createTextNode(`${r.label} ${r.name}`));
      return [
        cell,
        r.firstCategory,
        r.secondCategory,
        r.keyWords.join(", "),
        r.duration_formatted,
        `${Math.round(r.proportion * 100)}%`,
        r.representative_sentences_en.join(" ")
      ];
    })
  );
}

loadData().then(renderApp).catch((error) => {
  console.error(error);
  document.getElementById("app").textContent = error.message;
});
